<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Bits - Local Test</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  
  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    .test-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-lg);
      height: calc(100vh - 120px);
      padding: var(--space-lg);
    }
    
    .test-panel {
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    
    .test-panel-header {
      padding: var(--space-md);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    
    .test-panel-header h3 {
      font-size: 0.9rem;
      font-weight: 600;
    }
    
    .test-panel-body {
      flex: 1;
      overflow: auto;
    }
    
    .editor {
      width: 100%;
      height: 100%;
      padding: var(--space-md);
      border: none;
      resize: none;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.5;
      background: var(--bg-card);
      color: var(--text-primary);
    }
    
    .editor:focus {
      outline: none;
    }
    
    .preview {
      padding: var(--space-lg);
    }
    
    .sample-btn {
      padding: var(--space-xs) var(--space-sm);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .sample-btn:hover {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }
    
    @media (max-width: 1024px) {
      .test-container {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
        height: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="site-header">
    <div class="header-content">
      <div class="logo">
        <span class="logo-icon">💠</span>
        <h1>Blue Bits - Local Test</h1>
      </div>
      <div class="header-controls">
        <button class="sample-btn" id="loadSample">
          <i class="fas fa-file-alt"></i>
          Load Sample
        </button>
        <button class="icon-btn" id="themeToggle">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Test Container -->
  <main class="test-container">
    <!-- Input Panel -->
    <section class="test-panel">
      <div class="test-panel-header">
        <h3>Markdown Input</h3>
        <span style="font-size: 0.8rem; color: var(--text-muted);">Auto-renders on input (600ms delay)</span>
      </div>
      <div class="test-panel-body">
        <textarea class="editor" id="markdownInput" placeholder="اكتب الـ Markdown هنا...&#10;&#10;مثال:&#10;# عنوان&#10;&#10;معادلة: $E = mc^2$&#10;&#10;معادلةDisplay: $$\int_0^1 x^2 dx$$&#10;&#10;```mermaid&#10;graph TD&#10;A[Start] --&gt; B[End]&#10;```"></textarea>
      </div>
    </section>

    <!-- Output Panel -->
    <section class="test-panel">
      <div class="test-panel-header">
        <h3>Live Preview</h3>
        <span style="font-size: 0.8rem; color: var(--text-muted);" id="renderStatus"></span>
      </div>
      <div class="test-panel-body">
        <div class="preview" id="previewOutput">
          <p style="color: var(--text-muted); text-align: center; padding: var(--space-xl);">
            اكتب الـ Markdown في اللوحة اليسرى لرؤية النتيجة
          </p>
        </div>
      </div>
    </section>
  </main>

  <!-- CDN Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.8/purify.min.js"></script>
  
  <script>
    /**
     * Blue Bits - Local Test Runner
     * Tests markdown rendering without server
     */
    
    const SAMPLE_GRAPH_THEORY = `# نظرية المخططات · Graph Theory

## 📐 التعاريف الأساسية
- المخطط \`G(V,E)\` حيث \`V\` رؤوس و \`E\` حواف
- درجة الرأس: \`$\\deg(v) = |E(v)|$\`
- مصافحة الأيدي: \`$\\sum_{v \in V} \deg(v) = 2|E|$\`

## 🌲 خوارزمية بريم (MST)
$$
\\text{Pick } e \\in \\delta(T) \\text{ s.t. } w(e) = \\min_{f \\in \\delta(T)} w(f)
$$

## 🗺 مخطط العجلة \`Wₙ\`
\`\`\`mermaid
graph TD
  H[Hub] --> A[Rim 1]
  H --> B[Rim 2]
  H --> C[Rim 3]
  A --> B --> C --> A
\`\`\`

## 📊 جدول مرجعي

| المخطط | \`n\` | \`m\` | مستوي؟            |
| ------ | --- | --- | ----------------- |
| \`K₅\`   | 5   | 10  | ❌ \`$10 > 3(5)-6$\` |
| \`K₃,₃\` | 6   | 9   | ❌ \`$9 > 2(6)-4$\`  |

## 💡 ملاحظات
- **شرط لمستوي**: \`$m \\le 3n - 6$\`
- **نظرية أويلر**: مخطط مستوي له تكلفة إذا وفقط إذا كان كل régionSimply connected
`;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initMermaid();
      setupEditor();
      setupTheme();
    });

    function initMermaid() {
      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({
          startOnLoad: false,
          theme: 'default'
        });
      }
    }

    function setupTheme() {
      const toggle = document.getElementById('themeToggle');
      toggle?.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        toggle.querySelector('i').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      });

      // Initialize theme
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (prefersDark) {
        document.documentElement.setAttribute('data-theme', 'dark');
        toggle.querySelector('i').className = 'fas fa-sun';
      }
    }

    function setupEditor() {
      const input = document.getElementById('markdownInput');
      const output = document.getElementById('previewOutput');
      const status = document.getElementById('renderStatus');
      const loadSample = document.getElementById('loadSample');
      
      let renderTimeout;
      
      // Debounced render
      input?.addEventListener('input', () => {
        clearTimeout(renderTimeout);
        renderTimeout = setTimeout(render, 600);
      });
      
      // Load sample
      loadSample?.addEventListener('click', () => {
        input.value = SAMPLE_GRAPH_THEORY;
        render();
      });
      
      async function render() {
        const md = input.value;
        if (!md.trim()) {
          output.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: var(--space-xl);">اكتب الـ Markdown في اللوحة اليسرى لرؤية النتيجة</p>';
          status.textContent = '';
          return;
        }
        
        status.textContent = 'Rendering...';
        
        try {
          // Preprocess cards
          let processedMd = md;
          const cardRegex = /\[card\s+icon="([^"]+)"\s+title="([^"]+)"\]([\s\S]*?)\[\/card\]/g;
          let cardId = 0;
          const cards = {};
          
          processedMd = processedMd.replace(cardRegex, (match, icon, title, content) => {
            cardId++;
            cards[cardId] = { icon, title, content };
            return `<div class="summary-card" data-card-id="${cardId}">${content}</div>`;
          });
          
          // Parse markdown
          const html = marked.parse(processedMd);
          const safeHtml = DOMPurify.sanitize(html);
          
          // Render cards
          const tempDiv = document.createElement('div');
          tempDiv.innerHTML = safeHtml;
          
          const cardEls = tempDiv.querySelectorAll('.summary-card');
          cardEls.forEach(card => {
            const cid = card.dataset.cardId;
            if (cards[cid]) {
              const { icon, title } = cards[cid];
              card.innerHTML = `
                <div class="card-title">
                  <span class="card-icon">${icon}</span>
                  ${title}
                </div>
                ${card.innerHTML}
              `;
            }
          });
          
          // Inject content
          output.innerHTML = tempDiv.innerHTML;
          
          // Render KaTeX
          renderMathInElement(output, {
            delimiters: [
              { left: '$$', right: '$$', display: true },
              { left: '$', right: '$', display: false }
            ],
            throwOnError: false
          });
          
          // Render Mermaid
          await renderMermaid();
          
          status.textContent = '✓ Rendered';
          
        } catch (error) {
          console.error('Render error:', error);
          status.textContent = 'Error: ' + error.message;
        }
      }
      
      async function renderMermaid() {
        const mermaidBlocks = output.querySelectorAll('pre code.language-mermaid');
        
        for (const block of mermaidBlocks) {
          try {
            const graphDefinition = block.textContent;
            const id = 'mermaid-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            
            const { svg } = await mermaid.render(id, graphDefinition);
            
            const wrapper = document.createElement('div');
            wrapper.className = 'mermaid';
            wrapper.innerHTML = svg;
            
            block.closest('pre')?.replaceWith(wrapper);
          } catch (error) {
            console.error('Mermaid error:', error);
          }
        }
      }
    }
  </script>
</body>
</html>
